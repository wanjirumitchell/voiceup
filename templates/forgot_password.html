{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="hero-icon mb-3" style="width:60px;height:60px;font-size:1.4rem;margin:0 auto">
            <i class="fas fa-key"></i>
          </div>
          <h4 class="fw-bold">Forgot Password?</h4>
          <p class="text-muted">Enter your email and we'll generate a reset link</p>
        </div>
        <form method="POST">
          <div class="mb-4">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" name="email" class="form-control" required placeholder="you@example.com">
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="fas fa-paper-plane me-2"></i>Send Reset Link
          </button>
        </form>
        <p class="text-center mt-3 mb-0 text-muted small">
          Remembered your password? <a href="{{ url_for('user_login') }}">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
