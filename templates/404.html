<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | VoiceUp</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@700&family=Cabinet+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f2ff, #faf0ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cabinet Grotesk', sans-serif;
      text-align: center;
      padding: 24px;
    }
    .error-box { max-width: 480px; }
    .error-emoji { font-size: 5rem; margin-bottom: 16px; animation: bounce 2s infinite; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-16px); }
    }
    .error-code {
      font-family: 'Clash Display', sans-serif;
      font-size: 6rem;
      font-weight: 700;
      color: #6366f1;
      line-height: 1;
      margin-bottom: 8px;
    }
    .error-title {
      font-family: 'Clash Display', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
    }
    .error-desc { color: #64748b; margin-bottom: 32px; font-size: 1rem; }
    .btn-home {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-family: 'Clash Display', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(99,102,241,0.3);
      transition: transform 0.2s;
    }
    .btn-home:hover { transform: translateY(-2px); color: #fff; }
    .btn-back {
      color: #6366f1;
      text-decoration: none;
      font-weight: 600;
      margin-left: 16px;
    }
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-emoji">🔍</div>
    <div class="error-code">404</div>
    <div class="error-title">Page Not Found</div>
    <p class="error-desc">Oops! The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn-home"><i class="fas fa-home"></i> Go Home</a>
    <a href="javascript:history.back()" class="btn-back">← Go Back</a>
  </div>
</body>
</html>
