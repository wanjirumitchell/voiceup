{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h4 class="fw-bold">Set New Password</h4>
          <p class="text-muted">Choose a strong password for your account</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <input type="password" name="password" class="form-control" required minlength="8" placeholder="At least 8 characters">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm Password</label>
            <input type="password" name="confirm" class="form-control" required placeholder="Repeat password">
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="fas fa-lock me-2"></i>Reset Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
