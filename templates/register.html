{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h4 class="fw-bold">Create Account</h4>
          <p class="text-muted">Join VoiceUp and make your voice heard</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" name="fullname" class="form-control" value="{{ fullname|default('') }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" value="{{ email|default('') }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Role</label>
            <select name="role" class="form-select">
              <option value="student" {% if role|default('student')=='student' %}selected{% endif %}>Student</option>
              <option value="staff"   {% if role|default('')=='staff' %}selected{% endif %}>Staff</option>
              <option value="parent"  {% if role|default('')=='parent' %}selected{% endif %}>Parent</option>
            </select>
          </div>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" minlength="8" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Confirm Password</label>
              <input type="password" name="confirm_password" class="form-control" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="fas fa-user-plus me-2"></i>Create Account
          </button>
        </form>
        <p class="text-center mt-3 mb-0 text-muted small">
          Already have an account? <a href="{{ url_for('user_login') }}">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
