{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="hero-icon mb-3" style="width:60px;height:60px;font-size:1.5rem;margin:0 auto">
            <i class="fas fa-bullhorn"></i>
          </div>
          <h4 class="fw-bold">Welcome Back</h4>
          <p class="text-muted">Sign in to your VoiceUp account</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
          </button>
        </form>
        <p class="text-center mt-3 mb-0 text-muted small">
          Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </p>
        <p class="text-center mt-2 mb-0">
          <a href="{{ url_for('forgot_password') }}" class="text-muted small">Forgot password?</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
