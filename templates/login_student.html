{% extends 'base.html' %}
{% block title %}Student Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="hero-icon mb-3" style="width:60px;height:60px;font-size:1.4rem;margin:0 auto">
            <i class="fas fa-id-card"></i>
          </div>
          <h4 class="fw-bold">Student Login</h4>
          <p class="text-muted">Sign in with your Student ID</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Student ID</label>
            <input type="text" name="student_id" class="form-control" placeholder="e.g. STD/2024/001" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('user_login') }}" class="text-muted small">Login with Email instead</a>
        </div>
        <p class="text-center mt-2 mb-0 text-muted small">
          Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
